name: Site notifier

on:
  schedule:
    - cron: '*/15 * * * *'   # fires every 15 min; each check has its own interval
  workflow_dispatch:           # also runnable manually from the Actions tab

jobs:
  notify:
    name: Run checks
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      # Rolling cache key: always restore the latest snapshot (via restore-keys
      # prefix fallback), always write a new entry keyed by run-id so the next
      # run can pick it up. This is how state.json persists across cron runs.
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: notifier-state-${{ github.run_id }}
          restore-keys: |
            notifier-state-

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run notifier
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run notifier.py
